<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="T1 Consulting">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16223C"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
  </defs>
  <!-- navy rounded tile -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- premium gold hairline -->
  <rect x="1.25" y="1.25" width="61.5" height="61.5" rx="12.75" fill="none" stroke="#CA8A04" stroke-opacity="0.45" stroke-width="1.5"/>
  <!-- T1 monogram (white), geometric -->
  <g fill="#FFFFFF">
    <!-- T bar -->
    <rect x="11" y="16" width="24" height="6.4" rx="2.4"/>
    <!-- T stem -->
    <rect x="19.8" y="16" width="6.4" height="32" rx="2"/>
    <!-- 1 stroke -->
    <rect x="38.6" y="16" width="6.4" height="32" rx="2"/>
    <!-- 1 base serif -->
    <rect x="34.5" y="43.6" width="14.6" height="4.4" rx="2"/>
  </g>
  <!-- 1 top flag -->
  <path d="M35.4 23.2 L41.8 16.4" stroke="#FFFFFF" stroke-width="5.4" stroke-linecap="round"/>
  <!-- signature gold accent dot -->
  <circle cx="52.4" cy="45.6" r="2.7" fill="#CA8A04"/>
</svg>
