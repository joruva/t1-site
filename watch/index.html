<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>T1 Consulting — A Father's Day Trailer</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#0F172A; --gold:#CA8A04; --gold-l:#E5B43A; --ink:#E2E8F0; --muted:#94A3B8; --line:#26344A; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--navy);color:var(--ink);min-height:100vh;
    background-image:radial-gradient(80% 60% at 80% -10%, rgba(202,138,4,0.16), transparent 55%),radial-gradient(70% 60% at 0% 110%, rgba(51,65,85,0.5), transparent 60%);}
  .wrap{max-width:1080px;margin:0 auto;padding:40px 28px 70px;}
  header{display:flex;align-items:center;justify-content:center;padding:8px 0 36px;}
  .brand{display:inline-flex;align-items:baseline;gap:13px;}
  .brand .mark{font-weight:800;font-size:1.5rem;letter-spacing:-0.06em;color:#fff;}
  .brand .div{align-self:stretch;width:2px;background:var(--muted);position:relative;margin:5px 1px;}
  .brand .div::after{content:"";position:absolute;left:50%;bottom:-5px;width:6px;height:6px;border-radius:50%;background:var(--gold);transform:translateX(-50%);}
  .brand .word{font-weight:400;font-size:.86rem;letter-spacing:.28em;text-transform:uppercase;color:var(--ink);}
  .eyebrow{text-align:center;color:var(--gold-l);font-weight:700;font-size:12.5px;letter-spacing:.22em;text-transform:uppercase;margin-bottom:14px;}
  h1{text-align:center;color:#fff;font-weight:800;letter-spacing:-0.035em;font-size:clamp(1.9rem,4.4vw,2.9rem);line-height:1.06;max-width:18ch;margin:0 auto 28px;}
  .player{border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 30px 80px -30px rgba(0,0,0,0.7);background:#000;}
  video{display:block;width:100%;height:auto;}
  .cta{text-align:center;margin-top:34px;}
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:15.5px;padding:13px 26px;border-radius:9px;text-decoration:none;background:var(--gold);color:var(--navy);transition:all .18s ease;}
  .btn:hover{background:#A16207;color:#fff;}
  .note{text-align:center;color:var(--muted);font-size:14px;margin-top:18px;}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="brand"><span class="mark">T1</span><span class="div"></span><span class="word">Consulting</span></span>
    </header>
    <p class="eyebrow">Happy Father's Day</p>
    <h1>From first concept to category leadership.</h1>
    <div class="player">
      <video controls preload="metadata" playsinline poster="/assets/og-image.png">
        <source src="/assets/t1-fathers-day-trailer.mp4" type="video/mp4">
        Your browser doesn't support embedded video — <a href="/assets/t1-fathers-day-trailer.mp4" style="color:var(--gold-l)">download it here</a>.
      </video>
    </div>
    <div class="cta">
      <a class="btn" href="https://t1consult.com/">Visit your website &nbsp;&rarr;</a>
      <p class="note">t1consult.com</p>
    </div>
  </div>
</body>
</html>
